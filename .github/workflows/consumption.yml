name: Consumption

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: GCC 15
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # tabula's own build+test on GCC 15 is already covered by gcc.yml's
      # "15" leg; this workflow only exists to verify the three consumption
      # models documented in the README (find_package, add_subdirectory,
      # FetchContent), so -DBUILD_TESTING=OFF skips tabula's own tests here
      # and avoids needing vcpkg/Boost.Test/fmt at all. tabula is a pure
      # INTERFACE library, so there is nothing to actually build - only
      # configure and install.
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=gcc-15
          -DCMAKE_CXX_COMPILER=g++-15
          -DBUILD_TESTING=OFF

      - name: Install
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/tabula-prefix"

      - name: Consume installed package
        run: |
          mkdir consumer
          cd consumer
          cat > CMakeLists.txt << 'CMAKE'
          cmake_minimum_required(VERSION 3.28)
          project(consumer LANGUAGES CXX)
          find_package(tabula 0.1 CONFIG REQUIRED)
          add_executable(main main.cpp)
          target_link_libraries(main PRIVATE tabula::tabula)
          CMAKE
          cat > main.cpp << 'CPP'
          #include <tabula/games.hpp>

          int main()
          {
                  using namespace tabula;
                  constexpr auto b = chess::board{};
                  static_assert(b.width == 8);
                  static_assert(b.height == 8);
                  static_assert(b.size == 64);
                  return b.width == 8 && b.height == 8 ? 0 : 1;
          }
          CPP
          cmake -S . -B build \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/tabula-prefix"
          cmake --build build -v
          ./build/main


      - name: Consume with add_subdirectory
        run: |
          mkdir consumer-add-subdirectory
          cd consumer-add-subdirectory
          cat > CMakeLists.txt << 'CMAKE'
          cmake_minimum_required(VERSION 3.28)
          project(consumer_add_subdirectory LANGUAGES CXX)
          # no BUILD_TESTING workaround: tabula only builds its tests (and
          # requires Boost.Test/fmt) when it is the top-level project, which
          # this consumer configure would fail on if that gating regressed
          add_subdirectory("$ENV{GITHUB_WORKSPACE}" tabula-build)
          add_executable(main main.cpp)
          target_link_libraries(main PRIVATE tabula::tabula)
          CMAKE
          cat > main.cpp << 'CPP'
          #include <tabula/games.hpp>

          int main()
          {
                  using namespace tabula;
                  constexpr auto b = chess::board{};
                  static_assert(b.width == 8);
                  static_assert(b.height == 8);
                  static_assert(b.size == 64);
                  return b.width == 8 && b.height == 8 ? 0 : 1;
          }
          CPP
          cmake -S . -B build -DCMAKE_CXX_COMPILER=g++-15
          cmake --build build -v
          ./build/main

      - name: Consume with FetchContent
        run: |
          mkdir consumer-fetch-content
          cd consumer-fetch-content
          cat > CMakeLists.txt << 'CMAKE'
          cmake_minimum_required(VERSION 3.28)
          project(consumer_fetch_content LANGUAGES CXX)
          include(FetchContent)
          FetchContent_Declare(tabula SOURCE_DIR "$ENV{GITHUB_WORKSPACE}")
          FetchContent_MakeAvailable(tabula)
          add_executable(main main.cpp)
          target_link_libraries(main PRIVATE tabula::tabula)
          CMAKE
          cat > main.cpp << 'CPP'
          #include <tabula/games.hpp>

          int main()
          {
                  using namespace tabula;
                  constexpr auto b = chess::board{};
                  static_assert(b.width == 8);
                  static_assert(b.height == 8);
                  static_assert(b.size == 64);
                  return b.width == 8 && b.height == 8 ? 0 : 1;
          }
          CPP
          cmake -S . -B build -DCMAKE_CXX_COMPILER=g++-15
          cmake --build build -v
          ./build/main
