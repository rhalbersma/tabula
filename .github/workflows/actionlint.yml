name: actionlint

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint workflows
        # Use the maintained image instead of constructing a release-asset
        # URL. That URL is not stable across actionlint release packaging.
        run: >
          docker run --rm
          --volume "$GITHUB_WORKSPACE:/repo:ro"
          --workdir /repo
          rhysd/actionlint:1.7.7
          -color .github/workflows/*.yml
