name: GCC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: GCC ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "15"
            version: 15
            cc: gcc-15
            cxx: g++-15
            trunk: false
          - label: "16"
            version: 16
            cc: gcc-16
            cxx: g++-16
            trunk: false
          - label: 17-SVN
            version: 17
            cc: gcc-17
            cxx: g++-17
            trunk: true

    steps:
      - uses: actions/checkout@v7

      - name: Install GCC ${{ matrix.version }} (stable)
        if: "!matrix.trunk"
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cxx }}

      # Installs Jonathan Wakely's binary snapshot of GCC trunk (see
      # https://jwakely.github.io/pkg-gcc-latest/). Not an official GCC
      # release, but this leg is required like any other: tabula tracks
      # trunk deliberately and expects to adapt to it rather than ignore it.
      # The version banner includes the snapshot's build date, which we use
      # below to key the Boost cache so it invalidates whenever the snapshot
      # actually changes.
      - name: Install GCC trunk snapshot
        if: matrix.trunk
        id: gcc-trunk
        run: |
          wget -q https://kayari.org/gcc-latest/gcc-latest.deb -O gcc-latest.deb
          sudo dpkg -i gcc-latest.deb || sudo apt-get install -f -y
          sudo ln -sf /opt/gcc-latest/bin/gcc        /usr/bin/${{ matrix.cc }}
          sudo ln -sf /opt/gcc-latest/bin/g++        /usr/bin/${{ matrix.cxx }}
          sudo ln -sf /opt/gcc-latest/bin/gcov       /usr/bin/gcov-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcov-dump  /usr/bin/gcov-dump-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcov-tool  /usr/bin/gcov-tool-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-ar     /usr/bin/gcc-ar-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-nm     /usr/bin/gcc-nm-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-ranlib /usr/bin/gcc-ranlib-${{ matrix.version }}
          printf '%s\n' \
            '# Multiarch support' \
            /opt/gcc-latest/lib \
            /opt/gcc-latest/lib64 | sudo tee /etc/ld.so.conf.d/gcc-latest.conf > /dev/null
          sudo ldconfig
          ${{ matrix.cc }} --version
          ${{ matrix.cxx }} --version
          echo "version=$(${{ matrix.cxx }} --version | head -1)" >> "$GITHUB_OUTPUT"

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        if: "!matrix.trunk"
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # vcpkg is used instead of the distro's boost package so tabula tracks
      # recent Boost releases regardless of what the OS bundles. All
      # apt-installed GCCs share the system libstdc++, so ABI is consistent
      # regardless of which one built vcpkg's Boost/fmt.
      - name: Install Boost.Test and fmt (stable)
        if: "!matrix.trunk"
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet x64-linux

      # vcpkg's prebuilt Boost.Test is compiled by an older, ABI-stable GCC.
      # Linking it against the trunk snapshot breaks
      # Boost.Test's runtime parameter registration ("Test setup error:
      # Parameter catch_system_errors"), because the snapshot ships its own,
      # newer libstdc++ (unlike apt-installed compilers, which all share the
      # system one). Building Boost.Test from source with the same trunk
      # compiler avoids the mismatch. The Boost version is resolved via the
      # GitHub API so this doesn't go stale; the resulting build is cached
      # (keyed on the exact trunk snapshot + Boost version) since a rebuild
      # otherwise costs several minutes on every run. fmt is header-only in
      # its usage here (find_package(fmt REQUIRED) picks up its CMake
      # config), so vcpkg's prebuilt fmt is reused unchanged.
      - name: Resolve latest Boost version
        if: matrix.trunk
        id: boost-version
        run: |
          # /releases/latest can return a beta (boostorg doesn't always flag
          # them as prerelease), so list releases and keep strict boost-X.Y.Z
          boost_tag=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" "https://api.github.com/repos/boostorg/boost/releases?per_page=20" | grep '"tag_name"' | cut -d'"' -f4 | grep -E -m1 '^boost-[0-9]+\.[0-9]+\.[0-9]+$')
          echo "tag=$boost_tag" >> "$GITHUB_OUTPUT"

      - name: Cache Boost (trunk)
        if: matrix.trunk
        id: cache-boost-trunk
        uses: actions/cache@v6
        with:
          path: /opt/boost-latest
          key: boost-trunk-${{ runner.os }}-${{ steps.gcc-trunk.outputs.version }}-${{ steps.boost-version.outputs.tag }}

      - name: Install Boost.Test (from source, trunk)
        if: matrix.trunk && steps.cache-boost-trunk.outputs.cache-hit != 'true'
        run: |
          boost_tag=${{ steps.boost-version.outputs.tag }}
          boost_ver=${boost_tag#boost-}
          wget -q "https://github.com/boostorg/boost/releases/download/${boost_tag}/boost-${boost_ver}-b2-nodocs.tar.gz" -O boost.tar.gz
          tar xzf boost.tar.gz
          cd "boost-${boost_ver}"
          echo "using gcc : trunk : ${{ matrix.cxx }} ;" > user-config.jam
          ./bootstrap.sh --prefix=/opt/boost-latest --with-libraries=test
          ./b2 install -j"$(nproc)" --prefix=/opt/boost-latest --user-config=user-config.jam toolset=gcc-trunk variant=release link=static threading=multi

      # fmt has no ABI-fragile pieces this trunk leg would trip over the way
      # Boost.Test's runtime registration does, so a source build via
      # apt.llvm.org's usual channels is unnecessary: vcpkg's x64-linux fmt,
      # installed once on the stable legs, is also installed here so
      # find_package(fmt REQUIRED) succeeds under the trunk compiler.
      - name: Install fmt (trunk)
        if: matrix.trunk
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install fmt --triplet x64-linux

      - name: Configure (stable)
        if: "!matrix.trunk"
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Configure (trunk)
        if: matrix.trunk
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DCMAKE_PREFIX_PATH="/opt/boost-latest;$VCPKG_INSTALLATION_ROOT/installed/x64-linux"
          -DBoost_NO_SYSTEM_PATHS=ON

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Verify the install rules and that a downstream consumer can locate
      # the installed package via find_package(tabula CONFIG). Once per
      # matrix (on the latest stable leg) is enough: the install/consume
      # path is compiler-independent.
      - name: Install (package smoke test)
        if: matrix.version == 16
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/tabula-prefix"

      - name: Consume installed package
        if: matrix.version == 16
        run: |
          mkdir consumer
          cd consumer
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.28)
          project(consumer LANGUAGES CXX)
          find_package(tabula 0.1 CONFIG REQUIRED)
          add_executable(main main.cpp)
          target_link_libraries(main PRIVATE tabula::tabula)
          EOF
          cat > main.cpp << 'EOF'
          #include <tabula/games.hpp>

          int main()
          {
                  using namespace tabula;
                  constexpr auto b = chess::board{};
                  static_assert(b.width == 8);
                  static_assert(b.height == 8);
                  static_assert(b.size == 64);
                  return b.width == 8 && b.height == 8 ? 0 : 1;
          }
          EOF
          cmake -S . -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/tabula-prefix"
          cmake --build build -v
          ./build/main
